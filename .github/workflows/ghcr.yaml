name: Build and Push Docker Image

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repo owner to lowercase string
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${OWNER}/karma-analyser:latest .
          docker tag ghcr.io/${OWNER}/karma-analyser:latest ghcr.io/${OWNER}/karma-analyser:${GITHUB_SHA}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${OWNER}/karma-analyser:latest
          docker push ghcr.io/${OWNER}/karma-analyser:${GITHUB_SHA}
