name: Build Karma Analyser image and push it to the GitHub Container Registry.

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner | lower }}/karma-analyser:latest .
          docker tag ghcr.io/${{ github.repository_owner | lower }}/karma-analyser:latest ghcr.io/${{ github.repository_owner | lower }}/karma-analyser:${GITHUB_SHA}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner | lower }}/karma-analyser:latest
          docker push ghcr.io/${{ github.repository_owner | lower }}/karma-analyser:${GITHUB_SHA}