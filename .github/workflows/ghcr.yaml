name: Create Docker Image

on:
  workflow_run:
    workflows: ["Check Code"]
    types:
      - completed

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set repo owner to lowercase string
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${OWNER}/karma-analyser:latest .
          docker tag ghcr.io/${OWNER}/karma-analyser:latest ghcr.io/${OWNER}/karma-analyser:${GITHUB_SHA}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${OWNER}/karma-analyser:latest
          docker push ghcr.io/${OWNER}/karma-analyser:${GITHUB_SHA}