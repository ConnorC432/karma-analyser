services:
  karma-analyser:
    image: karma-analyser:latest
    container_name: karma-analyser
    restart: unless-stopped
    environment:
      BOT_TOKEN: "${BOT_TOKEN}"
      KLIPY_KEY: "${KLIPY_KEY}"
      OLLAMA_ENDPOINT: "${OLLAMA_ENDPOINT}"
      SEARXNG_ENDPOINT: "${SEARXNG_ENDPOINT}"
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro